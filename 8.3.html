<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Alimentação Saudável</title>
<link rel="stylesheet" href="8.3.css">
</head>

<body>

<div class="container">

  <h1>🍎 ALIMENTAÇÃO SAUDÁVEL</h1>

  <!-- Cards principais -->
  <div class="grid">

    <div class="card">
      <img src="maca.webp" alt="Maçã">
      <div>
        <h2>MAÇÃ</h2>
        <p>52 kcal</p>
      </div>
    </div>

    <div class="card">
      <img src="frutas/Bananas.jpg" alt="Banana">
      <div>
        <h2>BANANA</h2>
        <p>89 kcal</p>
      </div>
    </div>

    <div class="card">
      <img src="frutas/laranja.jpg" alt="Laranja">
      <div>
        <h2>LARANJA</h2>
        <p>47 kcal</p>
      </div>
    </div>

    <div class="card">
      <img src="frutas/morango.webp" alt="Morango">
      <div>
        <h2>MORANGO</h2>
        <p>32 kcal</p>
      </div>
    </div>

  </div>

  <!-- Destaque -->
  <div class="destaque">
    <div class="icone">💚</div>
    <div>
      <h2>CUIDE DO SEU CORPO!</h2>
      <p>Uma alimentação saudável é o primeiro passo para uma vida melhor.</p>
    </div>
  </div>

  <!-- Cards pequenos -->
  <div class="grid-pequeno">

    <div class="card-coluna">
      <img src="frutas/abacaxi.webp" alt="Abacaxi">
      <h3>ABACAXI</h3>
      <p>50 kcal</p>
    </div>

    <div class="card-coluna">
      <img src="frutas/melancia.webp" alt="Melancia">
      <h3>MELANCIA</h3>
      <p>30 kcal</p>
    </div>

    <div class="card-coluna">
      <img src="frutas/uva.jpg" alt="Uva">
      <h3>UVA</h3>
      <p>69 kcal</p>
    </div>

    <div class="card-coluna">
      <img src="frutas/manga.jpg" alt="Manga">
      <h3>MANGA</h3>
      <p>60 kcal</p>
    </div>

  </div>

</div>

</body>
</html>
